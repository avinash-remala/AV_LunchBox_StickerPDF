name: Lunch Summary + PDF

on:
  workflow_dispatch:   # Triggered by cron-job.org or manually

jobs:

  # ── Step 1: Generate PDF and upload as artifact ───────────────────────────
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get install -y libreoffice

      - name: Install Python dependencies
        run: pip install -r src/requirements.txt

      - name: Generate PDF and summary
        run: python3 src/generate_pdf.py Templates/AR_Template.docx --google-sheet ${{ secrets.SPREADSHEET_ID }}

      - name: Upload PDF and summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunch-pdf-${{ github.run_number }}
          path: exports/
          retention-days: 30

  # ── Step 2: Send summary + PDF ────────────────────────────────────────────
  send-pdf:
    needs: generate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r src/requirements.txt

      - name: Download exports artifact
        uses: actions/download-artifact@v4
        with:
          name: lunch-pdf-${{ github.run_number }}
          path: exports/

      - name: Send summary + PDF email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SEND_PDF: 'true'
        run: python3 src/send_whatsapp.py

