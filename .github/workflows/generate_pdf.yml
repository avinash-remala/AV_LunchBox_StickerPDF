name: WhatsApp Message

on:
  workflow_dispatch:   # Trigger manually from GitHub Actions UI
    inputs:
      send_pdf:
        description: 'Include PDF attachment'
        type: boolean
        default: false

  schedule:
    - cron: '44 16 * * 1-5'   # 10:44 AM CST (UTC-6), Mon–Fri  → summary only
    - cron: '34 17 * * 1-5'   # 11:34 AM CST (UTC-6), Mon–Fri  → summary + PDF

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get install -y libreoffice

      - name: Install Python dependencies
        run: pip install -r src/requirements.txt

      - name: Generate PDF and summary
        run: python3 src/generate_pdf.py Templates/AR_Template.docx --google-sheet ${{ secrets.SPREADSHEET_ID }}

      - name: Upload PDF and summary as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lunch-pdf-${{ github.run_number }}
          path: exports/
          retention-days: 30

      - name: Install Twilio
        run: pip install twilio

      - name: WhatsApp Message
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SEND_PDF: ${{ github.event.schedule == '34 17 * * 1-5' || github.event.inputs.send_pdf == 'true' }}
        run: python3 src/send_whatsapp.py
